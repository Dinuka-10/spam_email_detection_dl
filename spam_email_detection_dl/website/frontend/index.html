<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mail Sorting Desk — Spam Detector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* =========================================================
   Design tokens
   ========================================================= */
:root {
  --ink-navy: #16223d;
  --ink-navy-deep: #0e1729;
  --paper: #ede4d3;
  --paper-dark: #ddcfa9;
  --paper-line: #c9b98f;
  --red-stamp: #b23a2f;
  --red-stamp-dark: #8a2a21;
  --green-stamp: #1f7a4d;
  --green-stamp-dark: #145936;
  --brass: #b8964f;
  --brass-light: #d9bd7a;
  --text-dark: #2b2118;
  --text-mute: #6c5f4a;
  --font-display: 'Special Elite', 'Courier New', monospace;
  --font-body: 'IBM Plex Sans', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}

* { box-sizing: border-box; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

html, body {
  margin: 0;
  min-height: 100vh;
  background: var(--ink-navy-deep);
  background-image:
    radial-gradient(circle at 15% 10%, rgba(184,150,79,0.08), transparent 40%),
    radial-gradient(circle at 85% 90%, rgba(184,150,79,0.06), transparent 45%);
  font-family: var(--font-body);
  color: var(--text-dark);
}

button { font-family: inherit; cursor: pointer; }
:focus-visible {
  outline: 3px solid var(--brass-light);
  outline-offset: 2px;
}

/* =========================================================
   Desk shell
   ========================================================= */
.desk {
  max-width: 1140px;
  margin: 0 auto;
  padding: 36px 24px 64px;
}

/* Letterhead */
.letterhead {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 24px;
  flex-wrap: wrap;
  border-bottom: 2px solid var(--brass);
  padding-bottom: 20px;
  margin-bottom: 32px;
}

.eyebrow {
  font-family: var(--font-mono);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 12px;
  color: var(--brass-light);
  margin: 0 0 8px;
}

.title {
  font-family: var(--font-display);
  font-size: clamp(32px, 5vw, 52px);
  color: var(--paper);
  margin: 0 0 10px;
  line-height: 1.05;
}

.subtitle {
  font-size: 15px;
  color: #b9c2d6;
  max-width: 46ch;
  margin: 0;
  line-height: 1.5;
}

.tag {
  font-family: var(--font-mono);
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 13px;
}
.tag-ham { background: rgba(31,122,77,0.18); color: #6fd3a3; }
.tag-spam { background: rgba(178,58,47,0.18); color: #ef9a8f; }

.status-wire {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: #b9c2d6;
  padding: 8px 14px;
  border: 1px solid rgba(184,150,79,0.4);
  border-radius: 999px;
  background: rgba(255,255,255,0.03);
}

.wire-light {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: #6c5f4a;
  box-shadow: 0 0 0 rgba(0,0,0,0);
  transition: background 0.3s ease, box-shadow 0.3s ease;
}
.wire-light.online {
  background: #4fd17a;
  box-shadow: 0 0 8px rgba(79,209,122,0.8);
}
.wire-light.offline {
  background: #e2564a;
  box-shadow: 0 0 8px rgba(226,86,74,0.7);
}
.wire-light.pending {
  background: #d9bd7a;
  animation: pulse-wire 1.1s ease-in-out infinite;
}
@keyframes pulse-wire {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}

/* =========================================================
   Main surface
   ========================================================= */
.surface {
  display: grid;
  grid-template-columns: 1.15fr 1fr;
  gap: 28px;
  align-items: start;
}

@media (max-width: 860px) {
  .surface { grid-template-columns: 1fr; }
}

/* --- Letter tray --- */
.letter-tray {
  position: relative;
}

.paper-clip {
  position: absolute;
  top: -14px;
  left: 34px;
  width: 26px;
  height: 46px;
  border: 5px solid var(--brass);
  border-radius: 13px;
  border-bottom-color: transparent;
  transform: rotate(-8deg);
  z-index: 2;
  box-shadow: 2px 2px 4px rgba(0,0,0,0.35);
}

.letter {
  background: var(--paper);
  background-image: repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent 31px,
    var(--paper-line) 32px
  );
  padding: 34px 30px 26px;
  border-radius: 3px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.4) inset;
  position: relative;
}

.letter::before {
  content: "";
  position: absolute;
  inset: 0;
  border: 1px solid rgba(43,33,24,0.12);
  pointer-events: none;
}

.letter-meta {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-mute);
  margin-bottom: 18px;
}

.letter-label {
  display: block;
  font-family: var(--font-display);
  font-size: 15px;
  color: var(--text-dark);
  margin-bottom: 10px;
}

.letter-body {
  width: 100%;
  min-height: 220px;
  resize: vertical;
  border: none;
  background: transparent;
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 32px;
  color: var(--text-dark);
  padding: 0;
}
.letter-body::placeholder { color: #9c8c6f; }
.letter-body:focus { outline: none; }

.tray-actions {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 18px;
  flex-wrap: wrap;
}

.btn-scan {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--ink-navy);
  color: var(--paper);
  border: none;
  padding: 13px 22px;
  border-radius: 4px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.03em;
  transition: transform 0.15s ease, background 0.2s ease;
}
.btn-scan:hover { background: var(--ink-navy-deep); transform: translateY(-1px); }
.btn-scan:active { transform: translateY(0); }
.btn-scan:disabled { opacity: 0.55; cursor: progress; transform: none; }
.btn-scan-arrow { transition: transform 0.2s ease; }
.btn-scan:hover .btn-scan-arrow { transform: translateX(3px); }

.btn-clear {
  background: none;
  border: none;
  color: var(--text-mute);
  font-size: 13px;
  text-decoration: underline;
  text-underline-offset: 3px;
}
.btn-clear:hover { color: var(--text-dark); }

.error-line {
  color: var(--red-stamp-dark);
  font-size: 13px;
  font-family: var(--font-mono);
  margin: 12px 0 0;
  min-height: 16px;
}

/* --- Verdict station --- */
.verdict-station {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.scanner-window {
  position: relative;
  background: linear-gradient(180deg, #1c2a4a, var(--ink-navy-deep));
  border: 1px solid rgba(184,150,79,0.35);
  border-radius: 6px;
  min-height: 320px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.scanner-beam {
  position: absolute;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--brass-light), transparent);
  top: 0;
  opacity: 0;
}
.scanner-beam.sweep {
  opacity: 1;
  animation: sweep 0.9s ease-in-out;
}
@keyframes sweep {
  0% { top: 6%; opacity: 0; }
  15% { opacity: 1; }
  85% { opacity: 1; }
  100% { top: 94%; opacity: 0; }
}

.verdict-idle {
  text-align: center;
  color: #8a94ad;
  font-size: 14px;
}
.idle-icon { font-size: 34px; margin-bottom: 10px; }

.stamp-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
}

.stamp {
  width: 168px;
  height: 168px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: scale(2.4) rotate(-18deg);
  opacity: 0;
  border: 6px double currentColor;
  position: relative;
}
.stamp.slam {
  animation: slam-down 0.42s cubic-bezier(.2,.9,.3,1.2) forwards;
}
.stamp.spam { color: var(--red-stamp); }
.stamp.ham { color: var(--green-stamp); }

@keyframes slam-down {
  0%   { transform: scale(2.4) rotate(-18deg); opacity: 0; }
  55%  { transform: scale(0.94) rotate(-6deg); opacity: 1; }
  75%  { transform: scale(1.06) rotate(-8deg); }
  100% { transform: scale(1) rotate(-7deg); opacity: 1; }
}

.stamp-text {
  font-family: var(--font-display);
  font-size: 30px;
  letter-spacing: 0.06em;
}

.stamp-ring {
  position: absolute;
  inset: 10px;
  border-radius: 50%;
  border: 1px solid currentColor;
  opacity: 0.6;
}

.confidence-block {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(184,150,79,0.3);
  border-radius: 6px;
  padding: 16px 18px;
}

.gauge-row {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 12px;
  color: #b9c2d6;
  margin-bottom: 8px;
}
.gauge-value { color: var(--paper); font-weight: 600; }

.gauge-track {
  height: 8px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  overflow: hidden;
}
.gauge-fill {
  height: 100%;
  width: 0%;
  border-radius: 999px;
  transition: width 0.6s cubic-bezier(.2,.8,.3,1), background 0.4s ease;
}

.ledger {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 168px;
  overflow-y: auto;
}
.ledger li {
  font-family: var(--font-mono);
  font-size: 12px;
  color: #9aa4bc;
  border-left: 3px solid transparent;
  padding: 6px 10px;
  background: rgba(255,255,255,0.03);
  border-radius: 3px;
  display: flex;
  justify-content: space-between;
  gap: 10px;
}
.ledger li.is-spam { border-left-color: var(--red-stamp); }
.ledger li.is-ham { border-left-color: var(--green-stamp); }
.ledger li span:first-child {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 65%;
}

/* Footer / API config */
.desk-footer {
  margin-top: 40px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: #7d88a3;
  flex-wrap: wrap;
}
.api-input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(184,150,79,0.35);
  color: var(--paper);
  padding: 6px 10px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
  min-width: 220px;
}
.btn-link {
  background: none;
  border: 1px solid var(--brass);
  color: var(--brass-light);
  padding: 5px 12px;
  border-radius: 4px;
  font-size: 12px;
}
.btn-link:hover { background: rgba(184,150,79,0.12); }

</style>
</head>
<body>

  <div class="desk">

    <!-- Header / letterhead -->
    <header class="letterhead">
      <div class="letterhead-inner">
        <p class="eyebrow">U.S. Mail Sorting Division &middot; Est. 2024</p>
        <h1 class="title">Spam Detection Desk</h1>
        <p class="subtitle">Feed a message through the scanner. The desk clerk stamps every letter <span class="tag tag-ham">HAM</span> or <span class="tag tag-spam">SPAM</span> before it moves on.</p>
      </div>

      <div class="status-wire" id="statusWire" title="API connection status">
        <span class="wire-light" id="wireLight"></span>
        <span class="wire-label" id="wireLabel">Checking line…</span>
      </div>
    </header>

    <!-- Main working surface -->
    <main class="surface">

      <!-- Left: the letter being scanned -->
      <section class="letter-tray" aria-label="Message input">
        <div class="paper-clip" aria-hidden="true"></div>
        <div class="letter">
          <div class="letter-meta">
            <span>Ref. No. <span id="refNo">0001</span></span>
            <span>Desk 4 — Incoming</span>
          </div>
          <label for="messageInput" class="letter-label">Transcribe the message below</label>
          <textarea id="messageInput" class="letter-body" placeholder="Dear Sir/Madam, you have been selected to receive..." spellcheck="false"></textarea>

          <div class="tray-actions">
            <button id="scanBtn" class="btn-scan">
              <span class="btn-scan-label">Process Message</span>
              <span class="btn-scan-arrow">&rarr;</span>
            </button>
            <button id="clearBtn" class="btn-clear">Clear desk</button>
          </div>
          <p class="error-line" id="errorLine" role="alert"></p>
        </div>
      </section>

      <!-- Right: the verdict station -->
      <section class="verdict-station" aria-label="Scan result">
        <div class="scanner-window">
          <div class="scanner-beam" id="scannerBeam"></div>

          <div class="verdict-idle" id="verdictIdle">
            <div class="idle-icon">&#9993;</div>
            <p>Awaiting a letter to inspect.</p>
          </div>

          <div class="stamp-wrap" id="stampWrap" hidden>
            <div class="stamp" id="stamp">
              <span class="stamp-text" id="stampText">HAM</span>
              <span class="stamp-ring"></span>
            </div>
          </div>
        </div>

        <div class="confidence-block" id="confidenceBlock" hidden>
          <div class="gauge-row">
            <span class="gauge-label">Certainty of clerk</span>
            <span class="gauge-value" id="confidenceValue">0%</span>
          </div>
          <div class="gauge-track">
            <div class="gauge-fill" id="gaugeFill"></div>
          </div>
        </div>

        <ul class="ledger" id="ledger" aria-label="Scan history"></ul>
      </section>

    </main>

    <footer class="desk-footer">
      <span>Connected endpoint:</span>
      <input type="text" id="apiBase" class="api-input" value="http://127.0.0.1:8000" spellcheck="false">
      <button id="saveApiBtn" class="btn-link">Update</button>
    </footer>

  </div>

<script>
(function () {
  "use strict";

  let apiBase = document.getElementById("apiBase").value.trim().replace(/\/$/, "");
  let refCounter = 1;
  let pollTimer = null;

  const els = {
    wireLight: document.getElementById("wireLight"),
    wireLabel: document.getElementById("wireLabel"),
    messageInput: document.getElementById("messageInput"),
    scanBtn: document.getElementById("scanBtn"),
    clearBtn: document.getElementById("clearBtn"),
    errorLine: document.getElementById("errorLine"),
    refNo: document.getElementById("refNo"),
    scannerBeam: document.getElementById("scannerBeam"),
    verdictIdle: document.getElementById("verdictIdle"),
    stampWrap: document.getElementById("stampWrap"),
    stamp: document.getElementById("stamp"),
    stampText: document.getElementById("stampText"),
    confidenceBlock: document.getElementById("confidenceBlock"),
    confidenceValue: document.getElementById("confidenceValue"),
    gaugeFill: document.getElementById("gaugeFill"),
    ledger: document.getElementById("ledger"),
    apiBaseInput: document.getElementById("apiBase"),
    saveApiBtn: document.getElementById("saveApiBtn"),
  };

  function pad(n) {
    return String(n).padStart(4, "0");
  }

  function setWire(state, label) {
    els.wireLight.className = "wire-light " + state;
    els.wireLabel.textContent = label;
  }

  async function checkConnection() {
    setWire("pending", "Checking line…");
    try {
      const res = await fetch(apiBase + "/", { method: "GET" });
      if (!res.ok) throw new Error("bad status");
      setWire("online", "Line connected");
      els.scanBtn.disabled = false;
    } catch (err) {
      setWire("offline", "Line down");
    }
  }

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    checkConnection();
    pollTimer = setInterval(checkConnection, 8000);
  }

  function resetVerdict() {
    els.stampWrap.hidden = true;
    els.stamp.className = "stamp";
    els.confidenceBlock.hidden = true;
    els.verdictIdle.style.display = "block";
  }

  function showVerdict(prediction, confidence) {
    els.verdictIdle.style.display = "none";
    els.stampWrap.hidden = false;

    const isSpam = prediction === "spam";
    els.stampText.textContent = isSpam ? "SPAM" : "HAM";
    els.stamp.className = "stamp " + (isSpam ? "spam" : "ham");

    // trigger sweep + slam
    els.scannerBeam.classList.remove("sweep");
    void els.scannerBeam.offsetWidth; // reflow to restart animation
    els.scannerBeam.classList.add("sweep");

    els.stamp.classList.remove("slam");
    void els.stamp.offsetWidth;
    setTimeout(() => els.stamp.classList.add("slam"), 250);

    const pct = Math.round(confidence * 100);
    els.confidenceBlock.hidden = false;
    els.confidenceValue.textContent = pct + "%";
    els.gaugeFill.style.width = "0%";
    els.gaugeFill.style.background = isSpam ? "var(--red-stamp)" : "var(--green-stamp)";
    requestAnimationFrame(() => {
      setTimeout(() => { els.gaugeFill.style.width = pct + "%"; }, 300);
    });

    addLedgerEntry(prediction, confidence);
  }

  function addLedgerEntry(prediction, confidence) {
    const li = document.createElement("li");
    li.className = prediction === "spam" ? "is-spam" : "is-ham";
    const snippet = els.messageInput.value.trim().slice(0, 40) || "(empty message)";
    li.innerHTML = `<span>#${pad(refCounter)} — ${snippet}</span><span>${prediction.toUpperCase()} · ${Math.round(confidence * 100)}%</span>`;
    els.ledger.prepend(li);
    refCounter += 1;
    els.refNo.textContent = pad(refCounter);
  }

  async function handleScan() {
    const message = els.messageInput.value.trim();
    els.errorLine.textContent = "";

    if (!message) {
      els.errorLine.textContent = "The clerk needs a message before stamping anything.";
      return;
    }

    els.scanBtn.disabled = true;
    els.scanBtn.querySelector(".btn-scan-label").textContent = "Processing…";

    try {
      const res = await fetch(apiBase + "/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });

      if (!res.ok) {
        throw new Error(`Server responded with ${res.status}`);
      }

      const data = await res.json();
      showVerdict(data.prediction, data.confidence);
      setWire("online", "Line connected");
    } catch (err) {
      els.errorLine.textContent = "Couldn't reach the sorting desk. Check the endpoint below and try again.";
      setWire("offline", "Line down");
    } finally {
      els.scanBtn.disabled = false;
      els.scanBtn.querySelector(".btn-scan-label").textContent = "Process Message";
    }
  }

  function handleClear() {
    els.messageInput.value = "";
    els.errorLine.textContent = "";
    resetVerdict();
    els.messageInput.focus();
  }

  function handleApiUpdate() {
    const value = els.apiBaseInput.value.trim().replace(/\/$/, "");
    if (!value) return;
    apiBase = value;
    startPolling();
  }

  els.scanBtn.addEventListener("click", handleScan);
  els.clearBtn.addEventListener("click", handleClear);
  els.saveApiBtn.addEventListener("click", handleApiUpdate);
  els.messageInput.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
      handleScan();
    }
  });

  resetVerdict();
  startPolling();
})();

</script>
</body>
</html>
